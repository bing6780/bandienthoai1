<section class="form-container">

    <h2>Đăng ký người dùng</h2>

    <form id="registerForm">

        <label>Họ và tên</label>
        <input type="text" id="name">

        <label>Email</label>
        <input type="email" id="email">

        <label>Mật khẩu</label>
        <input type="password" id="password">

        <label>
            <input type="checkbox" id="agree">
            Đồng ý điều khoản
        </label>

        <br><br>

        <button type="submit">
            Đăng ký
        </button>

    </form>

    <p id="result"></p>

</section>

<script>

document.getElementById("registerForm").addEventListener("submit", function(event){

event.preventDefault();

let name=document.getElementById("name").value.trim();

let email=document.getElementById("email").value.trim();

let password=document.getElementById("password").value;

let agree=document.getElementById("agree").checked;

let emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

let passwordRegex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

if(name==""){

result.innerHTML="Vui lòng nhập họ tên.";

result.style.color="red";

return;

}

if(!emailRegex.test(email)){

result.innerHTML="Email không hợp lệ.";

result.style.color="red";

return;

}

if(!passwordRegex.test(password)){

result.innerHTML="Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số.";

result.style.color="red";

return;

}

if(!agree){

result.innerHTML="Bạn phải đồng ý điều khoản.";

result.style.color="red";

return;

}

let user={

name:name,

email:email,

password:password

};

localStorage.setItem("user",JSON.stringify(user));

result.innerHTML="Đăng ký thành công!";

result.style.color="green";

document.getElementById("registerForm").reset();

});

</script>

</body>
</html>
